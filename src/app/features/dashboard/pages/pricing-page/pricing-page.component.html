<section class="pricing-content">
  <div class="pricing-title-block">
    <h3>Flexible Plans Tailored to Fit Your Community's Unique Needs!</h3>
    <app-billing-toggle [value]="billing()" (valueChange)="setBilling($event)"></app-billing-toggle>
  </div>

  <div class="row g-4">
    @for (plan of plans(); track plan.id) {
      <div class="col-12 col-md-6 col-lg-4">
        <app-pricing-card
          [plan]="plan"
          [billing]="billing()"
          (choose)="onChoose($event)"
        ></app-pricing-card>
      </div>
    }
  </div>
</section>
