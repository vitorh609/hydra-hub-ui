<app-page-container title="Documents">
  <div subtitle class="app-muted">Write and preview rich-text documents</div>
  <div breadcrumbs class="documents-breadcrumb app-muted small mb-4">Dashboard • Documents</div>

  <section class="documents-hero mb-4">
    <div>
      <div class="documents-breadcrumb app-muted">Dashboard • Documents</div>
      <h2 class="mb-0">Documents</h2>
    </div>
    <div class="documents-hero-illustration" aria-hidden="true">
      <svg viewBox="0 0 220 132" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="20" width="132" height="88" rx="14" />
        <rect x="42" y="42" width="88" height="8" rx="4" />
        <rect x="42" y="58" width="72" height="8" rx="4" />
        <rect x="42" y="74" width="64" height="8" rx="4" />
        <circle cx="178" cy="54" r="18" />
        <rect x="164" y="82" width="30" height="18" rx="7" />
      </svg>
    </div>
  </section>

  <form [formGroup]="form">
    <app-card padding="p-4" class="documents-card">
      <div class="documents-toolbar">
        <h5 class="mb-0">Document Workspace</h5>
        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-sm app-btn-outline" type="button" (click)="clearEditor()">Clear</button>
          <button class="btn btn-sm btn-primary" type="button" (click)="exportHtml()">Export HTML</button>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-12 col-lg-6">
          <div class="col-12 pb-1">
            <app-input
              label="Document Title"
              formControlName="title"
              placeholder="Enter document title"
            ></app-input>
          </div>

          <app-rich-html-editor
            formControlName="content"
            label="Document Editor"
            placeholder="Start writing your document..."
            [minHeight]="360"
            toolbarVariant="full"
          ></app-rich-html-editor>
        </div>

        <div class="col-12 col-lg-6">
          <app-document-preview-card
            title="Page Preview"
            [html]="contentHtml"
          ></app-document-preview-card>
        </div>
      </div>
    </app-card>
  </form>
</app-page-container>
