<app-card padding="p-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h5 class="mb-1">Payment Methods</h5>
      <div class="app-muted small">Last 7 days</div>
    </div>
    <button class="btn btn-sm btn-outline-light app-btn-outline">Details</button>
  </div>

  <div class="d-flex flex-column gap-3">
    @for (method of methods; track method.label) {
      <div class="payment-row">
        <div class="d-flex align-items-center gap-3">
          <div class="icon-badge app-surface-2">
            <app-icon [name]="method.icon" [size]="18"></app-icon>
          </div>
          <div>
            <div class="fw-semibold">{{ method.label }}</div>
            <div class="app-muted small">Processed</div>
          </div>
        </div>
        <div class="fw-semibold">{{ method.amount }}</div>
      </div>
    }
  </div>
</app-card>
