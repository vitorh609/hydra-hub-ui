<app-card padding="p-3">
  <div class="d-flex align-items-start justify-content-between">
    <div>
      <div class="app-muted text-uppercase small">{{ title }}</div>
      <div class="fs-4 fw-semibold mt-1">{{ value }}</div>
      <div class="d-flex align-items-center gap-2 mt-2">
        <span class="trend" [ngClass]="trend">
          <app-icon [name]="trendIcon" [size]="16"></app-icon>
          <span>{{ deltaText }}</span>
        </span>
      </div>
    </div>
    <div class="icon-badge" [ngClass]="accentClass">
      <app-icon [name]="iconName" [size]="20"></app-icon>
    </div>
  </div>
</app-card>
