<app-card padding="p-4">
  <div [formGroup]="form">
    <h5 class="mb-3">Change Password</h5>

    <app-input
      label="Current Password"
      type="password"
      formControlName="currentPassword"
      [id]="'current-password'"
    ></app-input>
    @if (showError(form.controls.currentPassword)) {
      <div class="text-danger small mt-1">Current password is required.</div>
    }

    <div class="mt-3">
      <app-input
        label="New Password"
        type="password"
        formControlName="newPassword"
        [id]="'new-password'"
      ></app-input>
      @if (showError(form.controls.newPassword)) {
        <div class="text-danger small mt-1">New password is required.</div>
      }
    </div>

    <div class="mt-3">
      <app-input
        label="Confirm Password"
        type="password"
        formControlName="confirmPassword"
        [id]="'confirm-password'"
      ></app-input>
      @if (showError(form.controls.confirmPassword)) {
        <div class="text-danger small mt-1">Confirm password is required.</div>
      }
      @if (showMismatch) {
        <div class="text-danger small mt-1">Passwords do not match.</div>
      }
    </div>
  </div>
</app-card>
